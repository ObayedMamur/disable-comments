services:
  db:
    image: mariadb:11.8.6
    volumes:
      - db_data:/var/lib/mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=somewordpress
      - MYSQL_DATABASE=wordpress
      - MYSQL_USER=wordpress
      - MYSQL_PASSWORD=wordpress

  wordpress:
    image: wordpress:latest
    ports:
      - ${PORT:-8080}:80
    restart: always
    depends_on:
      - db
    environment:
      - WORDPRESS_DB_HOST=db
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=wordpress
      - WORDPRESS_DB_NAME=wordpress
    volumes:
      - wp_data:/var/www/html
      - ../../:/var/www/html/wp-content/plugins/disable-comments
      - ./scripts/auto-login.php:/var/www/html/wp-content/mu-plugins/auto-login.php
      - ./scripts/tinyfilemanager.php:/var/www/html/tinyfilemanager.php

  wpcli:
    image: wordpress:cli
    user: 33:33
    depends_on:
      - db
      - wordpress
    volumes:
      - wp_data:/var/www/html
      - ../../:/var/www/html/wp-content/plugins/disable-comments
      - ./scripts/setup-wp.sh:/setup-wp.sh
    environment:
      - WORDPRESS_DB_HOST=db
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=wordpress
      - WORDPRESS_DB_NAME=wordpress
      - HOME=/tmp
    entrypoint: >
      /bin/sh -c "/setup-wp.sh && tail -f /dev/null"

volumes:
  db_data:
  wp_data:
